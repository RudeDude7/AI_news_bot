name: Daily News Fetcher

# Trigger the workflow at midnight UTC every day or manually via GitHub UI
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Run the Python script to fetch the news
      - name: Fetch news
        run: python scripts/fetch_news.py

      # Step 4: Commit and push changes using the github-actions bot
      # Checks if data/news.json has staged changes before committing to avoid empty commit errors
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          
          if git diff --staged --quiet; then
            echo "No new changes to news.json. Skipping commit."
          else
            git commit -m "chore: update daily news data"
            git push
          fi
